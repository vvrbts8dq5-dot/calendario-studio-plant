<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Ore — Dipendenti</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blu:#1a56db;--blu-scuro:#1245b5;--blu-chiaro:#e8f0fe;
    --verde:#057a55;--verde-chiaro:#def7ec;
    --giallo:#c27803;--giallo-chiaro:#fdf6b2;
    --rosso:#c81e1e;--rosso-chiaro:#fde8e8;
    --grigio-50:#f9fafb;--grigio-100:#f3f4f6;--grigio-200:#e5e7eb;
    --grigio-300:#d1d5db;--grigio-400:#9ca3af;--grigio-500:#6b7280;
    --grigio-600:#4b5563;--grigio-700:#374151;--grigio-800:#1f2937;
    --r:8px;--ombra:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--grigio-50);color:var(--grigio-800);line-height:1.5;min-height:100vh}
  button{cursor:pointer;border:none;font-family:inherit;font-size:14px}
  input,select,textarea{font-family:inherit}

  /* LOGIN */
  #schermata-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a56db 0%,#1245b5 100%)}
  .login-card{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);padding:40px;width:100%;max-width:400px}
  .login-icona{font-size:48px;text-align:center;margin-bottom:8px}
  .login-titolo{font-size:22px;font-weight:700;text-align:center;color:var(--grigio-800)}
  .login-sottotitolo{font-size:14px;color:var(--grigio-500);text-align:center;margin-bottom:28px}
  .campo{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
  .campo label{font-size:13px;font-weight:500;color:var(--grigio-600)}
  .campo input{padding:10px 12px;border:1px solid var(--grigio-300);border-radius:var(--r);font-size:14px;transition:border-color .15s}
  .campo input:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
  .btn-login{width:100%;padding:12px;background:var(--blu);color:white;border-radius:var(--r);font-size:15px;font-weight:600;margin-top:8px;transition:background .15s}
  .btn-login:hover{background:var(--blu-scuro)}
  .errore-login{background:var(--rosso-chiaro);color:var(--rosso);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none}

  /* APP */
  #app{display:none;min-height:100vh;flex-direction:column}
  header{background:var(--blu);color:white;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .header-titolo{font-size:17px;font-weight:700}
  .header-utente{display:flex;align-items:center;gap:14px}
  .header-nome{font-size:13px;opacity:.9}
  .btn-esci{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 14px;font-size:13px}
  .btn-esci:hover{background:rgba(255,255,255,.25)}

  /* NAV TAB */
  nav{background:white;border-bottom:1px solid var(--grigio-200);display:flex;padding:0 24px}
  .tab{padding:14px 18px;font-size:14px;font-weight:500;color:var(--grigio-500);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none}
  .tab.attivo{color:var(--blu);border-bottom-color:var(--blu)}
  .tab:hover:not(.attivo){color:var(--grigio-700)}

  /* CONTENUTO */
  main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}

  /* SEZIONI */
  .sezione{display:none}
  .sezione.attiva{display:block}

  /* CALENDARIO */
  .calendario-layout{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
  .col-calendario{flex:0 0 auto;min-width:300px}
  .col-form{flex:1;min-width:300px}

  .nav-mese{display:flex;gap:8px;align-items:center;margin-bottom:14px}
  .btn-mese{background:white;border:1px solid var(--grigio-300);color:var(--grigio-700);border-radius:var(--r);padding:7px 12px;font-size:15px}
  .btn-mese:hover{background:var(--grigio-50)}
  .sel-mese{flex:1;padding:8px 12px;border:1px solid var(--grigio-300);border-radius:var(--r);font-size:14px;font-weight:600;text-align:center;background:white}

  .card{background:white;border-radius:var(--r);box-shadow:var(--ombra);padding:18px}
  .griglia-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .dow{text-align:center;font-size:11px;font-weight:600;color:var(--grigio-400);padding:4px 0}
  .giorno-btn{aspect-ratio:1;border-radius:6px;border:2px solid transparent;background:transparent;font-size:13px;cursor:pointer;position:relative;transition:all .1s;color:var(--grigio-800)}
  .giorno-btn:hover{background:var(--grigio-100)}
  .giorno-btn.weekend{color:var(--grigio-400)}
  .giorno-btn.compilato{background:var(--verde-chiaro)}
  .giorno-btn.compilato::after{content:'';position:absolute;bottom:2px;right:2px;width:4px;height:4px;background:var(--verde);border-radius:50%}
  .giorno-btn.selezionato{background:var(--blu)!important;color:white!important;border-color:var(--blu)}
  .giorno-btn.selezionato::after{display:none}
  .leggenda{margin-top:10px;font-size:11px;color:var(--grigio-400);display:flex;gap:10px}

  /* FORM GIORNO */
  .form-titolo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
  .form-titolo{font-size:17px;font-weight:700}
  .stato-salvataggio{font-size:12px}
  .stato-ok{color:var(--verde)}
  .stato-err{color:var(--rosso)}
  .stato-carica{color:var(--grigio-400)}
  .griglia-campi{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .campo-ore label{font-size:12px;font-weight:500;color:var(--grigio-500);margin-bottom:3px;display:block}
  .campo-ore input,.campo-ore textarea{width:100%;padding:8px 10px;border:1px solid var(--grigio-300);border-radius:var(--r);font-size:14px;transition:border-color .15s;background:white}
  .campo-ore input:focus,.campo-ore textarea:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
  .campo-ore textarea{resize:vertical;grid-column:1/-1}
  .placeholder-form{text-align:center;color:var(--grigio-400);padding:48px;font-size:14px}
  .placeholder-icona{font-size:36px;margin-bottom:10px}

  .btn-salva{background:var(--blu);color:white;border-radius:var(--r);padding:8px 16px;font-size:14px;font-weight:500}
  .btn-salva:hover{background:var(--blu-scuro)}

  /* RIEPILOGO */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .stat-card{background:white;border-radius:var(--r);box-shadow:var(--ombra);padding:16px;text-align:center}
  .stat-val{font-size:24px;font-weight:700;color:var(--blu)}
  .stat-label{font-size:11px;color:var(--grigio-500);margin-top:2px}
  .tabella-wrap{background:white;border-radius:var(--r);box-shadow:var(--ombra);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 12px;text-align:left}
  thead tr{border-bottom:2px solid var(--grigio-200)}
  tbody tr{border-bottom:1px solid var(--grigio-100)}
  tbody tr:hover{background:var(--grigio-50)}
  .td-num{text-align:right}
  .td-tot{text-align:right;font-weight:700;color:var(--blu)}

  /* FERIE */
  .btn-primario{background:var(--blu);color:white;border-radius:var(--r);padding:8px 16px;font-size:14px;font-weight:500}
  .btn-primario:hover{background:var(--blu-scuro)}
  .btn-secondario{background:white;color:var(--grigio-700);border:1px solid var(--grigio-300);border-radius:var(--r);padding:8px 16px;font-size:14px;font-weight:500}
  .btn-secondario:hover{background:var(--grigio-50)}
  .btn-pericolo{background:var(--rosso);color:white;border-radius:var(--r);padding:5px 10px;font-size:12px}
  .sezione-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .sezione-titolo{font-size:20px;font-weight:700}
  .form-richiesta{background:white;border-radius:var(--r);box-shadow:var(--ombra);padding:20px;margin-bottom:20px;display:none}
  .form-richiesta.aperto{display:block}
  .griglia-richiesta{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .campo-form label{font-size:13px;font-weight:500;color:var(--grigio-600);margin-bottom:4px;display:block}
  .campo-form input,.campo-form select,.campo-form textarea{width:100%;padding:8px 10px;border:1px solid var(--grigio-300);border-radius:var(--r);font-size:14px;background:white}
  .campo-form input:focus,.campo-form select:focus,.campo-form textarea:focus{outline:none;border-color:var(--blu)}
  .lista-richieste{display:flex;flex-direction:column;gap:8px}
  .richiesta-item{background:white;border:1px solid var(--grigio-200);border-radius:var(--r);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .richiesta-info{}
  .richiesta-tipo{font-weight:600;font-size:14px;margin-bottom:2px}
  .richiesta-date{font-size:13px;color:var(--grigio-500)}
  .richiesta-nota{font-size:12px;color:var(--grigio-400);margin-top:2px}
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
  .badge-attesa{background:var(--giallo-chiaro);color:var(--giallo)}
  .badge-approvata{background:var(--verde-chiaro);color:var(--verde)}
  .badge-rifiutata{background:var(--rosso-chiaro);color:var(--rosso)}
  .alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
  .alert-ok{background:var(--verde-chiaro);color:var(--verde)}
  .alert-err{background:var(--rosso-chiaro);color:var(--rosso)}
  .vuoto{text-align:center;color:var(--grigio-400);padding:40px;font-size:14px}

  @media(max-width:600px){
    main{padding:16px}
    .griglia-campi{grid-template-columns:1fr 1fr}
    header{padding:0 16px}
    nav{padding:0 8px}
    .tab{padding:12px 10px;font-size:13px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="schermata-login">
  <div class="login-card">
    <div class="login-icona">⏱</div>
    <div class="login-titolo">Calendario Ore</div>
    <div class="login-sottotitolo">Portale Dipendenti</div>
    <div class="errore-login" id="errore-login"></div>
    <div class="campo">
      <label>Nome utente</label>
      <input type="text" id="input-username" placeholder="es. mario.rossi" autocomplete="username">
    </div>
    <div class="campo">
      <label>Password</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login-submit">Accedi</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column">
  <header>
    <div class="header-titolo">⏱ Calendario Ore</div>
    <div class="header-utente">
      <span class="header-nome" id="nome-utente"></span>
      <button class="btn-esci" id="btn-esci">Esci</button>
    </div>
  </header>
  <nav>
    <button class="tab attivo" data-tab="calendario">📅 Calendario</button>
    <button class="tab" data-tab="ferie">🏖️ Ferie & Permessi</button>
    <button class="tab" data-tab="riepilogo">📊 Riepilogo</button>
  </nav>
  <main>

    <!-- TAB CALENDARIO -->
    <div class="sezione attiva" id="tab-calendario">
      <div class="calendario-layout">
        <div class="col-calendario">
          <div class="nav-mese">
            <button class="btn-mese" id="mese-prec">‹</button>
            <select class="sel-mese" id="sel-mese"></select>
            <button class="btn-mese" id="mese-succ">›</button>
          </div>
          <div class="card">
            <div class="griglia-cal" id="header-dow"></div>
            <div class="griglia-cal" id="griglia-giorni"></div>
            <div class="leggenda">
              <span>🟢 compilato</span>
              <span>grigio = weekend</span>
            </div>
          </div>
        </div>
        <div class="col-form">
          <div class="card" id="form-giorno">
            <div class="placeholder-form">
              <div class="placeholder-icona">📅</div>
              <div>Seleziona un giorno per inserire le ore</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB FERIE -->
    <div class="sezione" id="tab-ferie">
      <div class="sezione-header">
        <div class="sezione-titolo">🏖️ Ferie & Permessi</div>
        <button class="btn-primario" id="btn-nuova-richiesta">+ Nuova Richiesta</button>
      </div>
      <div class="form-richiesta" id="form-richiesta">
        <div id="alert-richiesta"></div>
        <div class="griglia-richiesta">
          <div class="campo-form">
            <label>Tipo</label>
            <select id="tipo-richiesta">
              <option value="ferie">🏖️ Ferie</option>
              <option value="permesso">🕐 Permesso</option>
              <option value="rol">🔄 ROL / Recupero</option>
            </select>
          </div>
          <div class="campo-form">
            <label>Data Inizio</label>
            <input type="date" id="data-inizio-richiesta">
          </div>
          <div class="campo-form">
            <label>Data Fine</label>
            <input type="date" id="data-fine-richiesta">
          </div>
          <div class="campo-form" style="grid-column:1/-1">
            <label>Note (opzionale)</label>
            <textarea id="note-richiesta" rows="2" placeholder="Aggiungi una nota..."></textarea>
          </div>
        </div>
        <button class="btn-primario" id="btn-invia-richiesta" style="margin-top:14px">📤 Invia Richiesta</button>
      </div>
      <div id="alert-globale-ferie"></div>
      <div id="lista-richieste"><div class="vuoto">Caricamento...</div></div>
    </div>

    <!-- TAB RIEPILOGO -->
    <div class="sezione" id="tab-riepilogo">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">📊 Riepilogo Annuale 2026</h2>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="tabella-wrap">
        <table id="tabella-riepilogo">
          <thead><tr id="thead-riepilogo"></tr></thead>
          <tbody id="tbody-riepilogo"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDv60cdVI9GT0r9VZukaVhWuozWUAbop5c",
  authDomain: "calendario-studio-plant.firebaseapp.com",
  projectId: "calendario-studio-plant",
  storageBucket: "calendario-studio-plant.firebasestorage.app",
  messagingSenderId: "693007035080",
  appId: "1:693007035080:web:026feab436ecd3814053fd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── COSTANTI ─────────────────────────────────────────────────
const ANNO = 2026;
const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MESI_BREVI = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const CAMPI = [
  {k:'commessa', l:'N° Commessa', t:'text', placeholder:'es. 2026-001'},
  {k:'oreElectriciMD', l:'Ore Elettrici M.D.', t:'number'},
  {k:'oreStraordinariElettrico', l:'Ore Straord. Elettrici', t:'number'},
  {k:'oreMeccaniciMA', l:'Ore Meccanici M.A.', t:'number'},
  {k:'oreStraordinariMeccanico', l:'Ore Straord. Meccanici', t:'number'},
  {k:'oreAttivitaGenerali', l:'Ore Attività Generali', t:'number'},
  {k:'oreFerie', l:'Ore Ferie', t:'number'},
  {k:'orePermesso', l:'Ore Permesso', t:'number'},
  {k:'oreFestivitaMalattia', l:'Ore Festività/Malattia', t:'number'},
  {k:'oreRecuperoElettrico', l:'Ore Recupero Elettrici', t:'number'},
  {k:'oreRecuperoMeccanico', l:'Ore Recupero Meccanici', t:'number'},
  {k:'kmPercorsi', l:'Km Percorsi', t:'number'},
  {k:'speseExtra', l:'Spese Extra (€)', t:'number'},
  {k:'note', l:'Note', t:'textarea'},
];
const CAMPI_NUM = CAMPI.filter(c => c.t === 'number');
const TIPI_LABEL = {ferie:'🏖️ Ferie', permesso:'🕐 Permesso', rol:'🔄 ROL'};

// ── STATO ────────────────────────────────────────────────────
let utente = null;
let meseSel = new Date().getMonth();
let giornoCacheData = {}; // { 'YYYY-MM-DD': {...} }
let giornoSel = null;
let saveTimer = null;

// ── UTILS ─────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0')}
function dataStr(m,g){return `${ANNO}-${pad(m+1)}-${pad(g)}`}
function isWeekend(m,g){const d=new Date(ANNO,m,g).getDay();return d===0||d===6}
function getDays(m){return new Date(ANNO,m+1,0).getDate()}
function getPrimoGiorno(m){const d=new Date(ANNO,m,1).getDay();return d===0?6:d-1}
function hasData(d){if(!d)return false;return CAMPI.some(c=>{const v=d[c.k];return v!==undefined&&v!==''&&v!==0&&v!=='0'})}
function fmtData(s){if(!s)return '';const[y,m,g]=s.split('-');return `${g} ${MESI[parseInt(m)-1]}`}
function fmtNum(v,k){
  if(!v&&v!==0)return '-';
  if(v===0)return '-';
  const n=v%1===0?v:parseFloat(v).toFixed(1);
  if(k==='kmPercorsi')return n+' km';
  if(k==='speseExtra')return '€'+parseFloat(v).toFixed(2);
  return n+'h';
}

// ── LOGIN ─────────────────────────────────────────────────────
document.getElementById('btn-login-submit').addEventListener('click', doLogin);
document.getElementById('input-password').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin()});

async function doLogin(){
  const username = document.getElementById('input-username').value.trim().toLowerCase();
  const password = document.getElementById('input-password').value;
  const errDiv = document.getElementById('errore-login');
  errDiv.style.display='none';
  if(!username||!password){mostraErroreLogin('Inserisci username e password.');return}
  document.getElementById('btn-login-submit').textContent='Accesso...';
  try {
    const snap = await db.collection('dipendenti').doc(username).get();
    if(!snap.exists){mostraErroreLogin('Utente non trovato.');return}
    const dati = snap.data();
    if(!dati.abilitato){mostraErroreLogin('Account non abilitato. Contatta l\'amministratore.');return}
    if(dati.password !== password){mostraErroreLogin('Password errata.');return}
    utente = {username, nome:dati.nome||username, cognome:dati.cognome||''};
    sessionStorage.setItem('dipendente', JSON.stringify(utente));
    avviaApp();
  } catch(e){mostraErroreLogin('Errore di connessione: '+e.message)}
  finally{document.getElementById('btn-login-submit').textContent='Accedi'}
}

function mostraErroreLogin(msg){
  const e=document.getElementById('errore-login');
  e.textContent=msg;e.style.display='block';
}

// ── AVVIO APP ─────────────────────────────────────────────────
function avviaApp(){
  document.getElementById('schermata-login').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  document.getElementById('nome-utente').textContent=`👤 ${utente.nome} ${utente.cognome}`;
  inizializzaCalendario();
  caricaMese(meseSel);
  caricaRiepilogo();
}

// Controlla sessione salvata
const sessione = sessionStorage.getItem('dipendente');
if(sessione){try{utente=JSON.parse(sessione);avviaApp()}catch(e){sessionStorage.removeItem('dipendente')}}

// ── LOGOUT ────────────────────────────────────────────────────
document.getElementById('btn-esci').addEventListener('click',()=>{
  sessionStorage.removeItem('dipendente');
  utente=null;giornoSel=null;giornoCacheData={};
  document.getElementById('app').style.display='none';
  document.getElementById('schermata-login').style.display='flex';
  document.getElementById('input-username').value='';
  document.getElementById('input-password').value='';
});

// ── NAV TAB ───────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('attivo'));
    document.querySelectorAll('.sezione').forEach(s=>s.classList.remove('attiva'));
    tab.classList.add('attivo');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('attiva');
    if(tab.dataset.tab==='riepilogo')caricaRiepilogo();
    if(tab.dataset.tab==='ferie')caricaRichieste();
  });
});

// ── CALENDARIO ────────────────────────────────────────────────
function inizializzaCalendario(){
  // Header giorni settimana
  const headerDow = document.getElementById('header-dow');
  headerDow.innerHTML='';
  ['L','M','M','G','V','S','D'].forEach(d=>{
    const el=document.createElement('div');
    el.className='dow';el.textContent=d;
    headerDow.appendChild(el);
  });
  // Popola select mesi
  const sel=document.getElementById('sel-mese');
  sel.innerHTML='';
  MESI.forEach((m,i)=>{
    const opt=document.createElement('option');
    opt.value=i;opt.textContent=`${m} ${ANNO}`;
    if(i===meseSel)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change',()=>{meseSel=parseInt(sel.value);caricaMese(meseSel)});
  document.getElementById('mese-prec').addEventListener('click',()=>{if(meseSel>0){meseSel--;sel.value=meseSel;caricaMese(meseSel)}});
  document.getElementById('mese-succ').addEventListener('click',()=>{if(meseSel<11){meseSel++;sel.value=meseSel;caricaMese(meseSel)}});
}

async function caricaMese(m){
  const snap = await db.collection('timesheets').doc(String(ANNO))
    .collection('dipendenti').doc(utente.username)
    .collection('giorni').get();
  const msStr = pad(m+1);
  snap.forEach(d=>{
    if(d.id.startsWith(`${ANNO}-${msStr}`)) giornoCacheData[d.id]=d.data();
  });
  renderCalendario(m);
}

function renderCalendario(m){
  const griglia=document.getElementById('griglia-giorni');
  griglia.innerHTML='';
  const primo=getPrimoGiorno(m);
  const giorni=getDays(m);
  for(let i=0;i<primo;i++){
    const vuoto=document.createElement('div');griglia.appendChild(vuoto);
  }
  for(let g=1;g<=giorni;g++){
    const ds=dataStr(m,g);
    const btn=document.createElement('button');
    btn.className='giorno-btn';
    btn.textContent=g;
    if(isWeekend(m,g))btn.classList.add('weekend');
    if(hasData(giornoCacheData[ds]))btn.classList.add('compilato');
    if(giornoSel===ds)btn.classList.add('selezionato');
    btn.addEventListener('click',()=>selezionaGiorno(ds));
    btn.dataset.ds=ds;
    griglia.appendChild(btn);
  }
}

async function selezionaGiorno(ds){
  giornoSel=ds;
  renderCalendario(meseSel);
  const dati = giornoCacheData[ds] || await caricaGiorno(ds);
  renderFormGiorno(ds, dati||{});
}

async function caricaGiorno(ds){
  try{
    const snap=await db.collection('timesheets').doc(String(ANNO))
      .collection('dipendenti').doc(utente.username)
      .collection('giorni').doc(ds).get();
    if(snap.exists){giornoCacheData[ds]=snap.data();return snap.data()}
    return null;
  }catch(e){console.error(e);return null}
}

function renderFormGiorno(ds, dati){
  const [y,m,g]=ds.split('-');
  const dataLabel=`${g} ${MESI[parseInt(m)-1]} ${y}`;
  let html=`
    <div class="form-titolo-row">
      <div class="form-titolo">${dataLabel}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="stato-salvataggio" id="stato-salv"></span>
        <button class="btn-salva" onclick="salvaManualeGiorno()">💾 Salva</button>
      </div>
    </div>
    <div class="griglia-campi">
  `;
  CAMPI.forEach(c=>{
    const val=dati[c.k]!==undefined?dati[c.k]:'';
    if(c.t==='textarea'){
      html+=`<div class="campo-ore" style="grid-column:1/-1"><label>${c.l}</label><textarea id="campo-${c.k}" rows="3" onchange="aggiornaCampo('${c.k}',this.value)">${val}</textarea></div>`;
    } else {
      html+=`<div class="campo-ore"><label>${c.l}</label><input type="${c.t}" id="campo-${c.k}" value="${val}" ${c.t==='number'?'min="0" step="0.5"':''} ${c.placeholder?`placeholder="${c.placeholder}"`:'placeholder="0"'} oninput="aggiornaCampo('${c.k}',this.value)"></div>`;
    }
  });
  html+='</div>';
  document.getElementById('form-giorno').innerHTML=html;
}

function aggiornaCampo(k, v){
  if(!giornoSel)return;
  if(!giornoCacheData[giornoSel])giornoCacheData[giornoSel]={};
  giornoCacheData[giornoSel][k]= (CAMPI.find(c=>c.k===k)?.t==='number') ? (v===''?'':parseFloat(v)||0) : v;
  if(saveTimer)clearTimeout(saveTimer);
  document.getElementById('stato-salv').textContent='';
  saveTimer=setTimeout(()=>salvaGiorno(giornoSel), 1500);
}

async function salvaGiorno(ds){
  if(!ds||!giornoCacheData[ds])return;
  const stato=document.getElementById('stato-salv');
  if(stato)stato.innerHTML='<span class="stato-carica">Salvataggio...</span>';
  try{
    await db.collection('timesheets').doc(String(ANNO))
      .collection('dipendenti').doc(utente.username)
      .collection('giorni').doc(ds)
      .set({...giornoCacheData[ds], username:utente.username, data:ds, updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    if(stato)stato.innerHTML='<span class="stato-ok">✓ Salvato</span>';
    renderCalendario(meseSel);
    setTimeout(()=>{if(stato)stato.innerHTML=''},2500);
  }catch(e){
    if(stato)stato.innerHTML='<span class="stato-err">✗ Errore</span>';
  }
}

function salvaManualeGiorno(){
  if(saveTimer)clearTimeout(saveTimer);
  salvaGiorno(giornoSel);
}

// ── RIEPILOGO ─────────────────────────────────────────────────
async function caricaRiepilogo(){
  const snap=await db.collection('timesheets').doc(String(ANNO))
    .collection('dipendenti').doc(utente.username)
    .collection('giorni').get();
  const tutti={};
  snap.forEach(d=>{tutti[d.id]=d.data()});

  // Totali annuali per stat grid
  const statGrid=document.getElementById('stat-grid');
  const totAnnuali={};
  CAMPI_NUM.forEach(c=>{
    totAnnuali[c.k]=Object.values(tutti).reduce((s,d)=>s+(parseFloat(d[c.k])||0),0);
  });
  const statShow=[
    {k:'oreElectriciMD',l:'Ore Elettrici M.D.',icon:'⚡'},
    {k:'oreMeccaniciMA',l:'Ore Meccanici M.A.',icon:'🔧'},
    {k:'oreFerie',l:'Ore Ferie',icon:'🏖️'},
    {k:'kmPercorsi',l:'Km Totali',icon:'🚗'},
  ];
  statGrid.innerHTML=statShow.map(s=>`
    <div class="stat-card">
      <div style="font-size:24px">${s.icon}</div>
      <div class="stat-val">${fmtNum(totAnnuali[s.k],s.k)}</div>
      <div class="stat-label">${s.l}</div>
    </div>
  `).join('');

  // Tabella mensile
  const thead=document.getElementById('thead-riepilogo');
  thead.innerHTML='<th>Campo</th>'+MESI_BREVI.map(m=>`<th class="td-num">${m}</th>`).join('')+'<th class="td-tot">Tot</th>';
  const tbody=document.getElementById('tbody-riepilogo');
  tbody.innerHTML='';
  CAMPI_NUM.forEach((c,fi)=>{
    const tr=document.createElement('tr');
    let html=`<td style="font-weight:500;white-space:nowrap">${c.l}</td>`;
    let tot=0;
    for(let mi=0;mi<12;mi++){
      const ms=pad(mi+1);
      const val=Object.entries(tutti).filter(([d])=>d.startsWith(`${ANNO}-${ms}`)).reduce((s,[,d])=>s+(parseFloat(d[c.k])||0),0);
      html+=`<td class="td-num" style="color:${val>0?'#1f2937':'#e5e7eb'}">${val>0?(val%1===0?val:val.toFixed(1)):'-'}</td>`;
      tot+=val;
    }
    html+=`<td class="td-tot">${fmtNum(tot,c.k)}</td>`;
    tr.innerHTML=html;
    if(fi%2===1)tr.style.background='#f9fafb';
    tbody.appendChild(tr);
  });
}

// ── FERIE & PERMESSI ──────────────────────────────────────────
document.getElementById('btn-nuova-richiesta').addEventListener('click',()=>{
  const form=document.getElementById('form-richiesta');
  form.classList.toggle('aperto');
  document.getElementById('btn-nuova-richiesta').textContent=form.classList.contains('aperto')?'✕ Annulla':'+ Nuova Richiesta';
});

document.getElementById('btn-invia-richiesta').addEventListener('click', inviaRichiesta);

async function inviaRichiesta(){
  const tipo=document.getElementById('tipo-richiesta').value;
  const inizio=document.getElementById('data-inizio-richiesta').value;
  const fine=document.getElementById('data-fine-richiesta').value;
  const note=document.getElementById('note-richiesta').value;
  const alertDiv=document.getElementById('alert-richiesta');
  alertDiv.innerHTML='';
  if(!inizio||!fine){alertDiv.innerHTML='<div class="alert alert-err">Seleziona le date.</div>';return}
  if(fine<inizio){alertDiv.innerHTML='<div class="alert alert-err">La data fine deve essere uguale o successiva alla data inizio.</div>';return}
  document.getElementById('btn-invia-richiesta').textContent='Invio...';
  try{
    await db.collection('richieste_assenza').add({
      username:utente.username,
      nomeCompleto:`${utente.nome} ${utente.cognome}`.trim(),
      tipo,dataInizio:inizio,dataFine:fine,note,
      stato:'in_attesa',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('alert-globale-ferie').innerHTML='<div class="alert alert-ok">Richiesta inviata!</div>';
    setTimeout(()=>document.getElementById('alert-globale-ferie').innerHTML='',3000);
    document.getElementById('form-richiesta').classList.remove('aperto');
    document.getElementById('btn-nuova-richiesta').textContent='+ Nuova Richiesta';
    document.getElementById('data-inizio-richiesta').value='';
    document.getElementById('data-fine-richiesta').value='';
    document.getElementById('note-richiesta').value='';
    caricaRichieste();
  }catch(e){alertDiv.innerHTML=`<div class="alert alert-err">Errore: ${e.message}</div>`}
  finally{document.getElementById('btn-invia-richiesta').textContent='📤 Invia Richiesta'}
}

async function caricaRichieste(){
  const lista=document.getElementById('lista-richieste');
  lista.innerHTML='<div class="vuoto">Caricamento...</div>';
  try{
    const snap=await db.collection('richieste_assenza')
      .where('username','==',utente.username)
      .orderBy('createdAt','desc').get();
    if(snap.empty){lista.innerHTML='<div class="card vuoto">Nessuna richiesta presente.</div>';return}
    lista.innerHTML='<div class="lista-richieste">'+snap.docs.map(d=>{
      const r={id:d.id,...d.data()};
      const badge=r.stato==='in_attesa'?'badge-attesa':r.stato==='approvata'?'badge-approvata':'badge-rifiutata';
      const statoLabel=r.stato==='in_attesa'?'In attesa':r.stato==='approvata'?'Approvata':'Rifiutata';
      const periodo=r.dataInizio===r.dataFine?fmtData(r.dataInizio):`${fmtData(r.dataInizio)} → ${fmtData(r.dataFine)}`;
      const notaAdmin=r.notaAdmin?`<div class="richiesta-nota">💬 Admin: ${r.notaAdmin}</div>`:'';
      const btnElimina=r.stato==='in_attesa'?`<button class="btn-pericolo" onclick="eliminaRichiesta('${r.id}')">🗑 Elimina</button>`:'';
      return `<div class="richiesta-item">
        <div class="richiesta-info">
          <div class="richiesta-tipo">${TIPI_LABEL[r.tipo]||r.tipo} <span class="badge ${badge}">${statoLabel}</span></div>
          <div class="richiesta-date">${periodo}</div>
          ${r.note?`<div class="richiesta-nota">${r.note}</div>`:''}
          ${notaAdmin}
        </div>
        ${btnElimina}
      </div>`;
    }).join('')+'</div>';
  }catch(e){lista.innerHTML=`<div class="vuoto">Errore: ${e.message}</div>`}
}

async function eliminaRichiesta(id){
  if(!confirm('Eliminare questa richiesta?'))return;
  await db.collection('richieste_assenza').doc(id).delete();
  caricaRichieste();
}
